name: "vlCVX: Distribution"

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Distribution type'
        required: true
        type: choice
        options:
          - voters
          - delegators
      step:
        description: 'Step to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - merkle
          - publish
      dispatch_id:
        description: 'Unique dispatch ID for tracking'
        required: false
        type: string
        default: ''
      force_merkle:
        description: 'Force merkle regeneration even if files exist'
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "dispatch_id:${{ inputs.dispatch_id || 'manual' }}"
        if: always()
        run: echo "Temporal tracking"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          python: 'true'
          frozen-lockfile: 'false'

      # ── Report Generation (voters only) ──
      - name: Generate vlCVX report
        if: inputs.type == 'voters' && (inputs.step == 'all')
        run: make -f automation/reports.mk run-weekly-vlcvx
        env:
          EXPLORER_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}
          GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}

      - name: Commit report
        if: inputs.type == 'voters' && (inputs.step == 'all')
        uses: ./.github/actions/commit-and-push
        with:
          message: "chore: vlCVX report [${{ inputs.dispatch_id }}]"

      # ── Repartition (voters only) ──
      - name: Validate reports (pre-repartition)
        if: inputs.type == 'voters' && (inputs.step == 'all')
        run: make -f automation/distribution.mk validate-reports PROTOCOL=vlCVX

      - name: Run repartition
        if: inputs.type == 'voters' && (inputs.step == 'all')
        run: make -f automation/distribution.mk run-repartition PROTOCOL=vlCVX
        env:
          EXPLORER_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}

      - name: Commit repartition
        if: inputs.type == 'voters' && (inputs.step == 'all')
        uses: ./.github/actions/commit-and-push
        with:
          message: "chore: vlCVX repartition [${{ inputs.dispatch_id }}]"

      # ── Merkle ──
      - name: Pull latest before merkle
        if: inputs.step == 'all' || inputs.step == 'merkle'
        run: git pull --rebase --autostash origin main

      - name: Create merkle (delegators)
        if: inputs.type == 'delegators' && (inputs.step == 'all' || inputs.step == 'merkle')
        run: make -f automation/distribution.mk run-merkles PROTOCOL=vlCVX TYPE=delegators
        env:
          EXPLORER_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}

      - name: Commit merkle delegators
        if: inputs.type == 'delegators' && (inputs.step == 'all' || inputs.step == 'merkle')
        uses: ./.github/actions/commit-and-push
        with:
          message: "chore: vlCVX delegators-merkle [${{ inputs.dispatch_id }}]"

      - name: Create merkle (voters)
        if: inputs.type == 'voters' && (inputs.step == 'all' || inputs.step == 'merkle')
        run: make -f automation/distribution.mk run-merkles PROTOCOL=vlCVX TYPE=non-delegators
        env:
          EXPLORER_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}
          FORCE_UPDATE: ${{ inputs.force_merkle && 'true' || 'false' }}

      - name: Commit merkle voters
        if: inputs.type == 'voters' && (inputs.step == 'all' || inputs.step == 'merkle')
        uses: ./.github/actions/commit-and-push
        with:
          message: "chore: vlCVX voters-merkle [${{ inputs.dispatch_id }}]"

      # ── AI Verification (voters only) ──
      - name: AI verify distribution (voters)
        if: inputs.type == 'voters' && (inputs.step == 'all' || inputs.step == 'merkle')
        run: |
          WEEK=604800
          PERIOD=$(( $(date +%s) / WEEK * WEEK ))
          pnpm tsx script/verify/aiVerify.ts --timestamp $PERIOD --protocol vlCVX --deep
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}
          TEST_TELEGRAM_API_KEY: ${{ secrets.TEST_TELEGRAM_API_KEY }}
          TEST_TELEGRAM_CHAT_ID: ${{ secrets.TEST_TELEGRAM_CHAT_ID }}

      # ── Publish (only runs when explicitly requested, not with 'all') ──
      - name: Pull latest before publish
        if: inputs.step == 'publish'
        run: git pull --rebase --autostash origin main

      - name: Calculate current period
        if: inputs.step == 'publish'
        id: period
        run: |
          WEEK=604800
          CURRENT_TIMESTAMP=$(date +%s)
          CURRENT_PERIOD=$(( CURRENT_TIMESTAMP / WEEK * WEEK ))
          echo "current=$CURRENT_PERIOD" >> $GITHUB_OUTPUT

      - name: Check if already published
        if: inputs.step == 'publish'
        id: check_published
        run: |
          PERIOD=${{ steps.period.outputs.current }}
          SOURCE_DIR="bounties-reports/${PERIOD}/vlCVX"
          LATEST_DIR="bounties-reports/latest/vlCVX"

          if [ "${{ inputs.type }}" == "voters" ]; then
            SOURCE_FILE="${SOURCE_DIR}/vlcvx_merkle.json"
            LATEST_FILE="${LATEST_DIR}/vlcvx_merkle.json"
          else
            SOURCE_FILE="${SOURCE_DIR}/merkle_data_delegators.json"
            LATEST_FILE="${LATEST_DIR}/vlcvx_merkle_delegators.json"
          fi

          # Check if source file exists
          if [ ! -f "${SOURCE_FILE}" ]; then
            echo "Source file not found (${SOURCE_FILE}), skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if latest matches source (already published)
          if [ -f "${LATEST_FILE}" ]; then
            if diff -q "${SOURCE_FILE}" "${LATEST_FILE}" > /dev/null 2>&1; then
              echo "Already published (files match), skipping"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "skip=false" >> $GITHUB_OUTPUT

      # ── Safeguard: verify on-chain root matches source before publishing ──
      - name: Verify on-chain root matches source
        id: verify
        if: inputs.step == 'publish' && steps.check_published.outputs.skip != 'true'
        run: pnpm tsx script/helpers/verifyOnchainRoot.ts --target ${{ inputs.type }} --period ${{ steps.period.outputs.current }}
        env:
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}

      # ── Compute APR (delegators only — needs sCRVUSD transfers from Tuesday distribution) ──
      - name: Compute APR
        if: inputs.type == 'delegators' && inputs.step == 'publish' && steps.check_published.outputs.skip != 'true' && steps.verify.outputs.skip != 'true'
        run: pnpm tsx script/helpers/computevlCVXDelegatorsAPR.ts
        env:
          EXPLORER_KEY: ${{ secrets.ETHERSCAN_TOKEN }}
          WEB3_ALCHEMY_API_KEY: ${{ secrets.WEB3_ALCHEMY_API_KEY }}

      - name: Publish voters to latest
        if: inputs.type == 'voters' && inputs.step == 'publish' && steps.check_published.outputs.skip != 'true' && steps.verify.outputs.skip != 'true'
        run: |
          PERIOD=${{ steps.period.outputs.current }}
          mkdir -p "bounties-reports/latest/vlCVX"

          cp "bounties-reports/${PERIOD}/vlCVX/vlcvx_merkle.json" "bounties-reports/latest/vlCVX/vlcvx_merkle.json"

          for file in bounties-reports/${PERIOD}/vlCVX/vlcvx_merkle_*.json; do
            if [ -f "$file" ]; then
              CHAIN_ID=$(echo "$file" | sed 's/.*_\([0-9]*\)\.json/\1/')
              cp "$file" "bounties-reports/latest/vlCVX/vlcvx_merkle_${CHAIN_ID}.json"
            fi
          done

      - name: Publish delegators to latest
        if: inputs.type == 'delegators' && inputs.step == 'publish' && steps.check_published.outputs.skip != 'true' && steps.verify.outputs.skip != 'true'
        run: |
          PERIOD=${{ steps.period.outputs.current }}
          mkdir -p "bounties-reports/latest/vlCVX"
          cp "bounties-reports/${PERIOD}/vlCVX/merkle_data_delegators.json" "bounties-reports/latest/vlCVX/vlcvx_merkle_delegators.json"

          if [ -f "bounties-reports/${PERIOD}/vlCVX/APRs.json" ]; then
            cp "bounties-reports/${PERIOD}/vlCVX/APRs.json" "bounties-reports/latest/vlCVX/APRs.json"
          fi

      - name: Commit publish
        if: inputs.step == 'publish' && steps.check_published.outputs.skip != 'true' && steps.verify.outputs.skip != 'true'
        uses: ./.github/actions/commit-and-push
        with:
          message: "chore: vlCVX publish-${{ inputs.type }} [${{ inputs.dispatch_id }}]"

      # ── Cleanup & notification ──
      - name: Cleanup
        if: always()
        run: make -f automation/distribution.mk clean PROTOCOL=vlCVX || true

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "vlCVX: ${{ inputs.type }} distribution (step: ${{ inputs.step }})"
          dispatch_id: ${{ inputs.dispatch_id }}
          telegram_token: ${{ secrets.TG_API_KEY_BOT_ERROR }}
